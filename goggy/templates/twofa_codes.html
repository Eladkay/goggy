{% extends "base.html" %}
{% block title %}{{ t('recovery_title') }} — {{ blog_title }}{% endblock %}
{% block content %}
  <div class="auth-card twofa">
    <h1>{{ t('recovery_title') }}</h1>
    <p class="intro">{{ t('recovery_intro') }}</p>
    <ul class="recovery-codes" dir="ltr">
      {% for c in codes %}<li><code>{{ c }}</code></li>{% endfor %}
    </ul>
    <a class="upload-btn" href="/">{{ t('continue') }}</a>
  </div>
{% endblock %}
