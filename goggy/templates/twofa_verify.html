{% extends "base.html" %}
{% block title %}{{ t('twofa_verify_title') }} — {{ blog_title }}{% endblock %}
{% block content %}
  <div class="auth-card twofa">
    <h1>{{ t('twofa_verify_title') }}</h1>
    <p class="intro">{{ t('twofa_verify_intro') }}</p>
    {% if error %}<p class="error">{{ t(error) }}</p>{% endif %}

    <form method="post" action="/login/verify">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="code">{{ t('code') }}</label>
      <input type="text" id="code" name="code" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9 ]*" autofocus dir="ltr">

      <details class="recovery-toggle">
        <summary>{{ t('use_recovery') }}</summary>
        <label for="recovery">{{ t('recovery_code') }}</label>
        <input type="text" id="recovery" name="recovery" dir="ltr" autocomplete="off">
      </details>

      <button type="submit">{{ t('verify') }}</button>
    </form>
  </div>
{% endblock %}
